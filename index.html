async function savePrediction(matchId, home, away) {

async function saveMatchResult(matchId, home, away) {

}

function listenPredictions(cb) {
  const q = collection(db, "predictions");
  return onSnapshot(q, snap => {
    const data = {};
    snap.forEach(d => {
      const p = d.data();
      const mid = String(p.matchId);
      if (!data[mid]) data[mid] = {};
      data[mid][p.userId] = { home: p.home, away: p.away };
    });
    cb(data);
  });
}

function listenResults(cb) {
  const q = collection(db, "results");
  return onSnapshot(q, snap => {
    const data = {};
    snap.forEach(d => {
      const r = d.data();
      data[String(r.matchId)] = { home: r.home, away: r.away };
    });
    cb(data);
  });
}

// ─── SCORING ──────────────────────────────────────────────────────
const PTS_EXACT  = 3;
const PTS_DRAW   = 2; // nul correct sans score exact
const PTS_WINNER = 1; // vainqueur correct (ou nul correct déjà compté above)

function calcWinner(h, a) {
  if (h > a) return "home";
  if (a > h) return "away";
  return "draw";
}
function calcPoints(pred, result) {
  if (!pred || result === undefined || result === null) return 0;
  // Score exact
  if (pred.home === result.home && pred.away === result.away) return PTS_EXACT;
  const predW = calcWinner(pred.home, pred.away);
  const resW  = calcWinner(result.home, result.away);
  // Nul correct sans score exact
  if (predW === "draw" && resW === "draw") return PTS_DRAW;
  // Vainqueur correct
  if (predW === resW) return PTS_WINNER;
  return 0;
}
function computeScores(allPreds, allResults) {
  const totals  = { kevin: 0, myriam: 0, herve: 0 };
  const details = {
    kevin:  { exact: 0, draw: 0, winner: 0 },
    myriam: { exact: 0, draw: 0, winner: 0 },
    herve:  { exact: 0, draw: 0, winner: 0 }
  };

  // Source de vérité : matchs ESPN terminés + override Firestore si présent
  const finishedMatches = matches.filter(m => m.status === "FINISHED");
  finishedMatches.forEach(m => {
    const mid = String(m.id);
    // Priorité : résultat Firestore (admin override) sinon score ESPN direct
    const res = allResults[mid] || {
      home: m.score?.fullTime?.home ?? 0,
      away: m.score?.fullTime?.away ?? 0
    };
    PROFILES.forEach(p => {
      const pred = allPreds[mid]?.[p.id];
      if (!pred) return; // pas de prono = 0 pt, rien à faire
      const pts = calcPoints(pred, res);
      totals[p.id] += pts;
      if (pts === PTS_EXACT)       details[p.id].exact++;
      else if (pts === PTS_DRAW)   details[p.id].draw++;
      else if (pts === PTS_WINNER) details[p.id].winner++;
    });
  });

  return { totals, details };
}

// Pronos révélés seulement si TOUS ont pronostiqué OU si match commencé/terminé
function pronosRevealed(matchId, preds, match) {
  const isStarted = match.status === "IN_PLAY" || match.status === "PAUSED" || match.status === "FINISHED";
  if (isStarted) return true;
  // Vérifie aussi si le kick-off est passé (heure de match < maintenant)
  const kickoff = new Date(match.utcDate).getTime();
  if (Date.now() >= kickoff) return true;
  // Sinon : tous doivent avoir pronostiqué
  return PROFILES.every(pr => preds[pr.id] !== undefined);
}

// Un match est verrouillé (plus de modif) si commencé ou heure passée
function matchLocked(match) {
  if (match.status === "IN_PLAY" || match.status === "PAUSED" || match.status === "FINISHED") return true;
  return Date.now() >= new Date(match.utcDate).getTime();
}

// ─── ESPN API ─────────────────────────────────────────────────────
async function fetchMatches() {
  try {
    // ESPN scoreboard endpoint — même que Veher Live
    // On fetch aussi par dates pour avoir TOUS les matchs du tournoi
    const urls = [
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard",
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260630",
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260701-20260719",
    ];
    const results = await Promise.allSettled(
      urls.map(u => fetch(u, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : null))
    );
    // Merge & deduplicate by event id
    const seen = new Set();
    const events = [];
    for (const r of results) {
      if (r.status !== "fulfilled" || !r.value) continue;
      for (const ev of (r.value.events || [])) {
        if (!seen.has(ev.id)) { seen.add(ev.id); events.push(ev); }
      }
    }
    if (!events.length) throw new Error("no events");
    return events.map(normalizeESPN).sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));
  } catch(e) {
    console.warn("ESPN fetch failed", e);
    return [];
  }
}

function normalizeESPN(ev) {
  const comp = ev.competitions?.[0];
  const home = comp?.competitors?.find(c => c.homeAway === "home");
  const away = comp?.competitors?.find(c => c.homeAway === "away");

  // ESPN status — toutes les valeurs possibles
  const espnStatus = comp?.status?.type?.name
    || comp?.status?.type?.state
    || "STATUS_SCHEDULED";
  const stateType = comp?.status?.type?.state || ""; // "pre" | "in" | "post"

  const homeScore = parseInt(home?.score) ?? 0;
  const awayScore = parseInt(away?.score) ?? 0;

  // Mapping exhaustif ESPN → statut interne
  let status = "TIMED";
  if (
    espnStatus === "STATUS_FINAL" ||
    espnStatus === "STATUS_FULL_TIME" ||
    espnStatus === "STATUS_ABANDONED" ||
    espnStatus === "STATUS_POSTPONED" ||
    stateType === "post"
  ) {
    status = "FINISHED";
  } else if (
    espnStatus === "STATUS_IN_PROGRESS" ||
    espnStatus === "STATUS_HALFTIME" ||
    espnStatus === "STATUS_EXTRA_TIME" ||
    espnStatus === "STATUS_PENALTY" ||
    espnStatus === "STATUS_SHOOTOUT" ||
    espnStatus === "STATUS_SUSPENDED" ||
    espnStatus === "STATUS_DELAYED" ||
    stateType === "in"
  ) {
    status = "IN_PLAY";
  }

  // Group depuis notes ou nom de l'événement
  const note = comp?.notes?.[0]?.headline || ev.name || ev.shortName || "";
  const grpMatch = note.match(/Group\s+([A-Z])/i);
  const roundMatch = note.match(/(Round of|Quarter|Semi|Final)/i);
  const group = grpMatch
    ? `Groupe ${grpMatch[1]}`
    : roundMatch ? note : "";

  // Ville : ESPN met parfois la ville dans venue.address.city ou venue.fullName
  const venue = comp?.venue?.address?.city
    || comp?.venue?.fullName
    || comp?.venue?.address?.state
    || "";

  return {
    id: String(ev.id), // toujours string pour matcher Firestore
    group,
    utcDate: ev.date,
    status,
    espnRaw: espnStatus,
    homeTeam: {
      name: home?.team?.displayName || home?.team?.name || "?",
      shortName: home?.team?.abbreviation || home?.team?.shortDisplayName || home?.team?.displayName || "?"
    },
    awayTeam: {
      name: away?.team?.displayName || away?.team?.name || "?",
      shortName: away?.team?.abbreviation || away?.team?.shortDisplayName || away?.team?.displayName || "?"
    },
    score: { fullTime: { home: homeScore, away: awayScore } },
    venue,
    clock: comp?.status?.displayClock || comp?.status?.detail || "",
    period: comp?.status?.period || 0
  };
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) + " · " +
         d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

  return `
  <!-- HEADER -->
  <div class="header">
    <div class="logo">MONDIAL<span>26</span></div>
    <div class="header-right">
      <div class="header-user" id="btn-switch-user">

        <span>${me.name}</span>

    </div>
  </div>

    <div class="hero-sub">Coupe du Monde<br>USA · CAN · MEX</div>
  </div>

  <!-- PROFILES SCORE BAR -->

    ${PROFILES.map(p => {
      const isMe = p.id === currentUser;
      return `
      <div class="score-bar-item ${isMe ? "me" : ""}">
        <div class="sbi-initial ${isMe ? "active" : ""}">${p.initial}</div>

      </div>`;
    }).join("")}
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <div class="tab ${currentTab === "matches" ? "active" : ""}" data-tab="matches">Matchs</div>
    <div class="tab ${currentTab === "leaderboard" ? "active" : ""}" data-tab="leaderboard">Classement</div>
    <div class="tab ${currentTab === "mypronos" ? "active" : ""}" data-tab="mypronos">Mes pronos</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    ${currentTab === "matches" ? renderMatchesTab(liveMatches, upcomingMatches, finishedMatches, allPreds, allResults) : ""}
    ${currentTab === "leaderboard" ? renderLeaderboard(totals, details, allPreds, allResults) : ""}
    ${currentTab === "mypronos" ? renderMyPronos(allPreds, allResults) : ""}
  </div>`;
}

function renderMatchesTab(live, upcoming, finished, allPreds, allResults) {
  return `
  <div class="match-subtabs">
    <div class="subtab ${matchSubTab === "live" ? "active" : ""}" data-subtab="live">
      ${live.length > 0 ? `<span class="live-dot"></span>` : ""} Live ${live.length > 0 ? `<span class="badge">${live.length}</span>` : ""}
    </div>
    <div class="subtab ${matchSubTab === "upcoming" ? "active" : ""}" data-subtab="upcoming">À venir</div>
    <div class="subtab ${matchSubTab === "finished" ? "active" : ""}" data-subtab="finished">Terminés</div>
  </div>

  ${matchSubTab === "live" ? (live.length ? live.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match en cours</div>`) : ""}
  ${matchSubTab === "upcoming" ? (upcoming.length ? upcoming.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match à venir</div>`) : ""}
  ${matchSubTab === "finished" ? (finished.length ? finished.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match terminé</div>`) : ""}
  `;
}

function teamFr(t) {
  const key = t.shortName || t.name || "";
  const full = t.name || "";
  return TEAMS[key]?.fr || TEAMS[full]?.fr || full || key;
}
function teamFlag(t) {
  const key = t.shortName || t.name || "";
  const full = t.name || "";
  return TEAMS[key]?.flag || TEAMS[full]?.flag || "🏳️";
}

function renderMatchCard(m, allPreds, allResults) {
  const mid      = String(m.id);
  const isLive   = m.status === "IN_PLAY" || m.status === "PAUSED";
  const isDone   = m.status === "FINISHED";
  const isTimed  = !isLive && !isDone;
  const preds    = allPreds[mid] || {};
  // Score de référence : Firestore en priorité, sinon score ESPN direct
  const result   = allResults[mid] || (isDone ? {
    home: m.score?.fullTime?.home ?? 0,
    away: m.score?.fullTime?.away ?? 0
  } : null);
  const myP      = preds[currentUser];
  const kickoff  = new Date(m.utcDate).getTime();
  const locked   = isLive || isDone || Date.now() >= kickoff;
  const everyone = PROFILES.every(p => preds[p.id] !== undefined);
  const reveal   = everyone || locked;
  const myPts    = isDone && result && myP ? calcPoints(myP, result) : null;

  const homeFr   = teamFr(m.homeTeam);
  const awayFr   = teamFr(m.awayTeam);
  const homeFlag = teamFlag(m.homeTeam);
  const awayFlag = teamFlag(m.awayTeam);
  const scoreH   = (isLive || isDone) ? (m.score?.fullTime?.home ?? "?") : null;
  const scoreA   = (isLive || isDone) ? (m.score?.fullTime?.away ?? "?") : null;

  // ── Rangée du bas ──────────────────────────────────────────
  let bottomRow = "";
  if (reveal) {
    // Affiche tous les pronos
    const ptsLabel = pts => {
      if (pts === PTS_EXACT)  return ` <em>+3 🎯</em>`;
      if (pts === PTS_DRAW)   return ` <em>+2 ⚖️</em>`;
      if (pts === PTS_WINNER) return ` <em>+1 ✅</em>`;
      if (pts === 0)          return ` <em class="zero">0</em>`;
      return "";
    };
    const chips = PROFILES.map(p => {
      const pred = preds[p.id];
      if (!pred) return `<div class="prono-chip no-pred"><strong>${p.name}</strong> —</div>`;
      const pts = (isDone && result) ? calcPoints(pred, result) : null;
      const cls = pts === PTS_EXACT ? "exact" : pts === PTS_DRAW ? "draw" : pts === PTS_WINNER ? "winner" : pts === 0 && isDone ? "wrong" : "";
      return `<div class="prono-chip ${cls}"><strong>${p.name}</strong> ${pred.home}–${pred.away}${pts !== null ? ptsLabel(pts) : ""}</div>`;
    }).join("");
    const ptsBadge = myPts !== null ? `<div class="pts-chip">+${myPts}pt</div>` : "";
    bottomRow = `<div class="pronos-row">${chips}${ptsBadge}</div>`;
  } else if (isTimed && myP !== undefined) {
    // Mon prono + bouton modifier (pas encore tout le monde)
    const waiting = PROFILES.filter(p => preds[p.id] === undefined).map(p => p.name);
    bottomRow = `
      <div class="pronos-row">
        <div class="prono-chip me-chip">Mon prono : <strong>${myP.home}–${myP.away}</strong></div>
        <div class="prono-chip edit-chip" data-matchid="${mid}">Modifier</div>
      </div>
      <div class="awaiting-row"><span class="waiting-names">En attente : ${waiting.join(", ")}</span></div>`;
  } else if (isTimed) {
    // Pas encore pronostiqué
    const done = PROFILES.filter(p => preds[p.id] !== undefined).map(p => p.name);
    bottomRow = `
      <div class="predict-row">
        <div class="prono-inputs">
          <input class="score-input" type="number" min="0" max="20" placeholder="0" id="h_${mid}">
          <span class="input-sep">–</span>
          <input class="score-input" type="number" min="0" max="20" placeholder="0" id="a_${mid}">
        </div>
        <button class="prono-submit" data-matchid="${mid}">Valider ✓</button>
      </div>
      ${done.length ? `<div class="awaiting-row"><span class="done-names">${done.join(", ")} ✓</span><span class="waiting-names">En attente : ${PROFILES.filter(p => preds[p.id] === undefined).map(p => p.name).join(", ")}</span></div>` : ""}`;
  }

  return `
  <div class="match-card ${isLive ? "live" : ""} ${isDone ? "finished" : ""} ${isTimed ? "upcoming" : ""}">
    <div class="match-top">
      <div class="team-col home">
        <span class="team-flag">${homeFlag}</span>
        <span class="team-name">${homeFr}</span>
      </div>
      <div class="score-box ${isTimed ? "timed" : ""}">
        ${isTimed
          ? `<span class="score-time">${fmtDate(m.utcDate)}</span>`
          : `<span class="score-num">${scoreH}</span><span class="score-dash">–</span><span class="score-num">${scoreA}</span>`
        }
      </div>
      <div class="team-col away">
        <span class="team-name">${awayFr}</span>
        <span class="team-flag">${awayFlag}</span>
      </div>
    </div>
    <div class="match-meta">
      <div class="match-meta-info">${m.group || ""} · ${m.venue || ""}</div>
      ${isLive ? `<div class="live-badge"><span class="live-dot"></span> ${m.clock || "LIVE"}</div>` : ""}
      ${isDone  ? `<div class="finished-badge">Terminé</div>` : ""}
    </div>
    ${bottomRow}
  </div>`;
}

function renderLeaderboard(totals, details, allPreds, allResults) {
  const sorted = [...PROFILES].sort((a,b) => totals[b.id] - totals[a.id]);
  const finishedCount = Object.keys(allResults).length;
  const totalMatches = matches.length;

  return `
  <div class="lb-card">
    <div class="lb-header">Classement général · ${finishedCount} match${finishedCount > 1 ? "s" : ""} joué${finishedCount > 1 ? "s" : ""} / ${totalMatches}</div>
    ${sorted.map((p, i) => {
      const rank = i + 1;
      const isMe = p.id === currentUser;
      return `
      <div class="lb-row ${rank === 1 ? "first-place" : ""} ${isMe ? "is-me" : ""}">
        <div class="lb-rank ${rank === 1 ? "top" : ""}">${rank}</div>
        <div class="lb-avatar ${rank === 1 ? "gold" : ""}">${p.initial}</div>
        <div class="lb-info">
          <div class="lb-name">${p.name} ${isMe ? "<span class='me-tag'>moi</span>" : ""}</div>
          <div class="lb-breakdown">
            <span>${details[p.id].exact}</span> exact${details[p.id].exact > 1 ? "s" : ""} ·
            <span>${details[p.id].draw}</span> nul${details[p.id].draw > 1 ? "s" : ""} ·
            <span>${details[p.id].winner}</span> victoire${details[p.id].winner > 1 ? "s" : ""}
          </div>
        </div>
        <div class="lb-pts-block">
          <span class="lb-pts">${totals[p.id]}</span>
          <span class="lb-pts-label">PTS</span>
        </div>
      </div>`;
    }).join("")}
  </div>

  <div class="rules-card">
    <div class="rules-title">Système de points</div>
    <div class="rules-row"><div class="rules-pts exact-pts">+3</div><div>Score exact 🎯</div></div>
    <div class="rules-row"><div class="rules-pts draw-pts">+2</div><div>Nul correct ⚖️</div></div>
    <div class="rules-row"><div class="rules-pts winner-pts">+1</div><div>Vainqueur correct ✅</div></div>
    <div class="rules-row"><div class="rules-pts wrong-pts">0</div><div>Mauvais résultat</div></div>
  </div>`;
}

function renderMyPronos(allPreds, allResults) {
  const myMatches = matches.filter(m => allPreds[m.id]?.[currentUser] !== undefined);
  if (!myMatches.length) return `<div class="empty-state">Tu n'as pas encore pronostiqué</div>`;

  return myMatches.map(m => {
    const pred = allPreds[m.id][currentUser];
    const result = allResults[m.id];
    const pts = result ? calcPoints(pred, result) : null;
    const isFinished = m.status === "FINISHED";
    const cls = pts === PTS_EXACT ? "exact" : pts === PTS_WINNER ? "winner" : pts === 0 && isFinished ? "wrong" : "";

    return `
    <div class="my-prono-row ${cls}">
      <div class="mpr-teams">${teamFlag(m.homeTeam)} ${teamFr(m.homeTeam)} – ${teamFr(m.awayTeam)} ${teamFlag(m.awayTeam)}</div>
      <div class="mpr-pred">${pred.home}–${pred.away}</div>
      ${isFinished && result ? `<div class="mpr-result">${result.home}–${result.away}</div>` : `<div class="mpr-pending">${fmtDate(m.utcDate)}</div>`}
      ${pts !== null ? `<div class="mpr-pts ${cls}">+${pts}pt</div>` : ""}
    </div>`;
  }).join("");
}

// ─── MAIN ─────────────────────────────────────────────────────────
let allPreds = {};
let allResults = {};

async function init() {
  // Load matches from API
  const root = document.getElementById("root");
  root.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Chargement…</div></div>`;

  matches = await fetchMatches();

  // Listen Firestore in real-time
  listenPredictions(data => {
    allPreds = data;
    if (currentUser) renderPage();
  });
  listenResults(data => {
    allResults = data;
    if (currentUser) renderPage();
  });

  // Auto-refresh ESPN : 30s si match en cours, 60s sinon
  setInterval(async () => {
    const fresh = await fetchMatches();
    if (fresh.length > 0) {
      matches = fresh;
      if (currentUser) renderPage();
    }
  }, 30000);

  renderPage();
}

function renderPage() {
  const root = document.getElementById("root");
  if (!currentUser) {
    root.innerHTML = renderProfilePicker();
    attachProfilePickerEvents();
  } else {
    root.innerHTML = renderApp(allPreds, allResults);
    attachAppEvents();
  }
}

function attachProfilePickerEvents() {
  document.querySelectorAll(".profile-pick-card").forEach(el => {
    el.addEventListener("click", () => {
      currentUser = el.dataset.id;
      localStorage.setItem("mondial26_user", currentUser);
      renderPage();
    });
  });
}

function attachAppEvents() {
  // Tab switching
  document.querySelectorAll(".tab[data-tab]").forEach(el => {
    el.addEventListener("click", () => {
      currentTab = el.dataset.tab;
      renderPage();
    });
  });

  // Subtab switching
  document.querySelectorAll(".subtab[data-subtab]").forEach(el => {
    el.addEventListener("click", () => {
      matchSubTab = el.dataset.subtab;
      renderPage();
    });
  });

  // Submit prediction
  document.querySelectorAll(".prono-submit[data-matchid]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const mid = btn.dataset.matchid;
      const h = document.getElementById(`h_${mid}`)?.value;
      const a = document.getElementById(`a_${mid}`)?.value;
      if (h === "" || a === "" || h === undefined || a === undefined) {
        showToast("Entre les deux scores !");
        return;
      }
      btn.disabled = true;
      btn.textContent = "…";
      try {
        await savePrediction(mid, h, a);
        showToast("Prono enregistré ✓");
      } catch(e) {
        showToast("Erreur — réessaie");
        btn.disabled = false;
        btn.textContent = "Valider ✓";
      }
    });
  });

  // Edit prediction
  document.querySelectorAll(".edit-chip[data-matchid]").forEach(el => {
    el.addEventListener("click", () => {
      const mid = el.dataset.matchid;
      delete allPreds[mid]?.[currentUser];
      renderPage();
    });
  });

  // Switch user
  document.getElementById("btn-switch-user")?.addEventListener("click", () => {
    currentUser = null;
    localStorage.removeItem("mondial26_user");
    renderPage();
  });
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 2500);
}

init();
</script>

.match-card.live { border-color: var(--accent); }
.match-top {
  padding: var(--lh) var(--margin) var(--bl);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: var(--bl);
}
.team-col {
  display: flex; flex-direction: column; gap: 2px;
}
.team-col.away { align-items: flex-end; text-align: right; }
.team-flag { font-size: 20px; line-height: 24px; }
.team-name {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 13px; color: var(--ink);
  line-height: var(--lh); letter-spacing: -0.01em;
}
.match-card.upcoming .team-name { color: var(--ink-soft); }

.score-box {
  background: var(--accent);
  padding: var(--bl) var(--lh);
  display: flex; align-items: center;
  gap: var(--bl); min-width: 80px; justify-content: center;
}
.score-box.timed {
  background: #f0f0f0; flex-direction: column; gap: 0;
  min-width: 112px;
}
.score-time {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--ink-soft);
  text-align: center; letter-spacing: 0.05em;
  line-height: var(--lh);
}
.score-num {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 32px; color: white;
  line-height: 32px; letter-spacing: -0.02em;
}
.score-dash { color: rgba(255,255,255,0.3); font-size: 16px; line-height: 32px; }

.match-meta {
  padding: 0 var(--margin) var(--bl);
  display: flex; justify-content: space-between; align-items: center;
}
.match-meta-info {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--ink-soft);
  letter-spacing: 0.05em; line-height: var(--lh);
}
.live-badge {
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  color: var(--accent); display: flex; align-items: center; gap: var(--bl);
  text-transform: uppercase;
}
.finished-badge {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--ink-soft); letter-spacing: 0.1em;
}
.debug-status {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--ink-faint);
  letter-spacing: 0.05em;
}
.live-dot {
  width: 6px; height: 6px; background: var(--accent);
  display: inline-block;
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* PRONOS ROW */
.pronos-row {
  border-top: 1px solid #f0f0f0;
  padding: var(--bl) var(--margin);
  display: flex; gap: var(--bl); align-items: center; flex-wrap: wrap;
}
.prono-chip {
  background: #f8f8f8; border: 1px solid var(--ink-faint);
  padding: 4px var(--bl);
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--ink-soft); letter-spacing: 0.05em;
  line-height: var(--lh);
}
.prono-chip strong { color: var(--ink); font-weight: 700; }
.prono-chip.draw { border-color: #F59E0B; background: #FFFBEB; color: #B45309; }
.prono-chip.draw strong { color: #B45309; }
.prono-chip em { color: var(--blue); font-style: normal; margin-left: 4px; }
.prono-chip em.zero { color: var(--ink-faint); }
.draw-pts { color: #F59E0B; }
.prono-chip.exact { border-color: #22C55E; background: #F0FDF4; color: #15803D; }
.prono-chip.exact strong { color: #15803D; }
.prono-chip.winner { border-color: var(--blue); background: #F0F5FF; color: var(--blue); }
.prono-chip.winner strong { color: var(--blue); }
.prono-chip.wrong { border-color: #FECACA; background: #FFF5F5; color: #EF4444; }
.prono-chip.wrong strong { color: #EF4444; }
.prono-chip.me-chip { border-color: var(--blue); background: #F0F5FF; color: var(--blue); }
.prono-chip.edit-chip { cursor: pointer; border-style: dashed; }
.prono-chip.no-pred { opacity: 0.35; }
.pts-chip {
  margin-left: auto; background: var(--blue);
  padding: 4px var(--bl);
  font-family: 'Space Mono', monospace;
  font-size: 10px; font-weight: 700; color: white; letter-spacing: 0.05em;
  line-height: var(--lh);
}

/* PREDICT ROW */
.predict-row {
  border-top: 1px solid #f0f0f0;
  padding: var(--bl) var(--margin);
  display: flex; align-items: center; gap: var(--lh);
}
.prono-inputs { display: flex; align-items: center; gap: var(--bl); }
.score-input {
  width: 48px; height: 48px;
  border: 1px solid var(--ink-faint);
  text-align: center;
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 24px; color: var(--ink);
  outline: none; background: var(--paper);
  transition: border-color 0.12s; line-height: 48px;
}
.score-input:focus { border-color: var(--blue); }
.input-sep {
  font-size: 16px; color: var(--ink-faint);
  font-family: 'Inter', system-ui, sans-serif;
}
.prono-submit {
  margin-left: auto; background: var(--blue); color: white;
  border: none; padding: 12px var(--lh);
  font-family: 'Space Mono', monospace;
  font-weight: 700; font-size: 10px; letter-spacing: 0.15em;
  cursor: pointer; text-transform: uppercase; line-height: var(--lh);
  transition: background 0.12s;
}
.prono-submit:hover { background: #0052CC; }
.prono-submit:disabled { background: var(--ink-faint); cursor: default; }

/* AWAITING ROW */
.awaiting-row {
  border-top: 1px solid #f0f0f0;
  padding: var(--bl) var(--margin);
  display: flex; gap: var(--lh); align-items: center; flex-wrap: wrap;
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 0.05em; line-height: var(--lh);
}
.done-names { color: #22C55E; }
.waiting-names { color: var(--ink-soft); }

/* EMPTY STATE */
.empty-state {
  text-align: left; padding: calc(var(--lh) * 3) 0;
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--ink-faint); text-transform: uppercase;
  line-height: var(--lh);
}

/* ─── LEADERBOARD ─────────────────────────────────────────── */
.lb-card {
  background: var(--paper);
  border: 1px solid var(--ink-faint);
  margin-bottom: var(--lh);
}
.lb-header {
  background: var(--accent); padding: var(--bl) var(--margin);
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em; color: white;
  text-transform: uppercase; line-height: var(--lh);
}
.lb-row {
  display: grid;
  grid-template-columns: 24px var(--lh) 1fr auto;
  align-items: center; padding: var(--lh) var(--margin);
  gap: var(--lh); border-bottom: 1px solid #f0f0f0;
}
.lb-row:last-child { border: none; }
.lb-row.is-me { background: #f8f9ff; }
.lb-rank {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--ink-faint); font-weight: 700;
  line-height: var(--lh);
}
.lb-rank.top { color: var(--accent); }
.lb-avatar {
  width: var(--lh); height: var(--lh);
  background: var(--ink-faint); color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 11px;
}
.lb-avatar.gold { background: var(--blue); color: white; }
.lb-info {}
.lb-name {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
  line-height: var(--lh);
}
.me-tag {
  background: var(--blue); color: white;
  font-size: 9px; padding: 1px 5px;
  font-family: 'Space Mono', monospace; letter-spacing: 0.1em;
  vertical-align: middle; margin-left: var(--bl);
}
.lb-breakdown {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--ink-faint);
  letter-spacing: 0.05em; line-height: var(--lh);
  margin-top: 2px;
}
.lb-breakdown span { color: var(--accent); font-weight: 700; }
.lb-pts-block { text-align: right; }
.lb-pts {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 40px; color: var(--ink);
  line-height: 40px; letter-spacing: -0.03em; display: block;
}
.lb-pts-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--ink-soft); letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* RULES CARD */
.rules-card {
  background: var(--paper);
  border: 1px solid var(--ink-faint);
  padding: var(--lh) var(--margin);
}
.rules-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em; color: var(--ink-soft);
  text-transform: uppercase; margin-bottom: var(--lh);
  line-height: var(--lh);
}
.rules-row {
  display: flex; align-items: center; gap: var(--lh);
  padding: var(--bl) 0; border-bottom: 1px solid #f0f0f0;
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: var(--ink-soft); line-height: var(--lh);
}
.rules-row:last-child { border: none; }
.rules-pts {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 24px; width: 40px;
  line-height: 24px; letter-spacing: -0.02em;
}
.exact-pts { color: #22C55E; }
.draw-pts { color: #F59E0B; }
.winner-pts { color: var(--blue); }
.wrong-pts { color: var(--ink-faint); }

/* ─── MY PRONOS ───────────────────────────────────────────── */
.my-prono-row {
  background: var(--paper);
  border: 1px solid var(--ink-faint);
  margin-bottom: var(--bl);
  padding: var(--bl) var(--margin);
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center; gap: var(--bl);
  line-height: var(--lh);
}
.my-prono-row.exact { border-left: 3px solid #22C55E; }
.my-prono-row.winner { border-left: 3px solid var(--blue); }
.my-prono-row.wrong { border-left: 3px solid #FECACA; }
.mpr-teams {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 600; font-size: 13px; color: var(--ink);
  letter-spacing: -0.01em;
}
.mpr-pred {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 18px; color: var(--ink);
  line-height: var(--lh); letter-spacing: -0.02em;
}
.mpr-result {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: var(--ink-soft); line-height: var(--lh);
}
.mpr-pending {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--ink-faint); letter-spacing: 0.05em;
}
.mpr-pts {
  font-family: 'Inter', system-ui, sans-serif;
  font-weight: 900; font-size: 18px;
  line-height: var(--lh); letter-spacing: -0.02em;
  min-width: 24px; text-align: right;
}
.mpr-pts.exact { color: #22C55E; }
.mpr-pts.winner { color: var(--blue); }
.mpr-pts.wrong { color: var(--ink-faint); }

/* ─── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: var(--lh);
  left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: white;
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  padding: var(--bl) var(--lh);
  opacity: 0; transition: all 0.2s;
  z-index: 1000; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
</body>
