async function savePrediction(matchId, home, away) {

async function saveMatchResult(matchId, home, away) {

function listenPredictions(cb) {
  const q = collection(db, "predictions");
  return onSnapshot(q, snap => {
    const data = {};
    snap.forEach(d => {
      const p = d.data();
      const mid = String(p.matchId);
      if (!data[mid]) data[mid] = {};
      data[mid][p.userId] = { home: p.home, away: p.away };
    });
    cb(data);
  });
}

function listenResults(cb) {
  const q = collection(db, "results");
  return onSnapshot(q, snap => {
    const data = {};
    snap.forEach(d => {
      const r = d.data();
      data[String(r.matchId)] = { home: r.home, away: r.away };
    });
    cb(data);
  });
}

// ─── SCORING ──────────────────────────────────────────────────────
const PTS_EXACT  = 3;
const PTS_DRAW   = 2; // nul correct sans score exact
const PTS_WINNER = 1; // vainqueur correct (ou nul correct déjà compté above)

function calcWinner(h, a) {
  if (h > a) return "home";
  if (a > h) return "away";
  return "draw";
}
function calcPoints(pred, result) {
  if (!pred || result === undefined || result === null) return 0;
  // Score exact
  if (pred.home === result.home && pred.away === result.away) return PTS_EXACT;
  const predW = calcWinner(pred.home, pred.away);
  const resW  = calcWinner(result.home, result.away);
  // Nul correct sans score exact
  if (predW === "draw" && resW === "draw") return PTS_DRAW;
  // Vainqueur correct
  if (predW === resW) return PTS_WINNER;
  return 0;
}
function computeScores(allPreds, allResults) {
  const totals  = { kevin: 0, myriam: 0, herve: 0 };
  const details = {
    kevin:  { exact: 0, draw: 0, winner: 0 },
    myriam: { exact: 0, draw: 0, winner: 0 },
    herve:  { exact: 0, draw: 0, winner: 0 }
  };

  // Source de vérité : matchs ESPN terminés + override Firestore si présent
  const finishedMatches = matches.filter(m => m.status === "FINISHED");
  finishedMatches.forEach(m => {
    const mid = String(m.id);
    // Priorité : résultat Firestore (admin override) sinon score ESPN direct
    const res = allResults[mid] || {
      home: m.score?.fullTime?.home ?? 0,
      away: m.score?.fullTime?.away ?? 0
    };
    PROFILES.forEach(p => {
      const pred = allPreds[mid]?.[p.id];
      if (!pred) return; // pas de prono = 0 pt, rien à faire
      const pts = calcPoints(pred, res);
      totals[p.id] += pts;
      if (pts === PTS_EXACT)       details[p.id].exact++;
      else if (pts === PTS_DRAW)   details[p.id].draw++;
      else if (pts === PTS_WINNER) details[p.id].winner++;
    });
  });

  return { totals, details };
}

// Pronos révélés seulement si TOUS ont pronostiqué OU si match commencé/terminé
function pronosRevealed(matchId, preds, match) {
  const isStarted = match.status === "IN_PLAY" || match.status === "PAUSED" || match.status === "FINISHED";
  if (isStarted) return true;
  // Vérifie aussi si le kick-off est passé (heure de match < maintenant)
  const kickoff = new Date(match.utcDate).getTime();
  if (Date.now() >= kickoff) return true;
  // Sinon : tous doivent avoir pronostiqué
  return PROFILES.every(pr => preds[pr.id] !== undefined);
}

// Un match est verrouillé (plus de modif) si commencé ou heure passée
function matchLocked(match) {
  if (match.status === "IN_PLAY" || match.status === "PAUSED" || match.status === "FINISHED") return true;
  return Date.now() >= new Date(match.utcDate).getTime();
}

// ─── ESPN API ─────────────────────────────────────────────────────
async function fetchMatches() {
  try {
    // ESPN scoreboard endpoint — même que Veher Live
    // On fetch aussi par dates pour avoir TOUS les matchs du tournoi
    const urls = [
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard",
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260630",
      "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260701-20260719",
    ];
    const results = await Promise.allSettled(
      urls.map(u => fetch(u, { signal: AbortSignal.timeout(8000) }).then(r => r.ok ? r.json() : null))
    );
    // Merge & deduplicate by event id
    const seen = new Set();
    const events = [];
    for (const r of results) {
      if (r.status !== "fulfilled" || !r.value) continue;
      for (const ev of (r.value.events || [])) {
        if (!seen.has(ev.id)) { seen.add(ev.id); events.push(ev); }
      }
    }
    if (!events.length) throw new Error("no events");
    return events.map(normalizeESPN).sort((a,b) => new Date(a.utcDate) - new Date(b.utcDate));
  } catch(e) {
    console.warn("ESPN fetch failed", e);
    return [];
  }
}

function normalizeESPN(ev) {
  const comp = ev.competitions?.[0];
  const home = comp?.competitors?.find(c => c.homeAway === "home");
  const away = comp?.competitors?.find(c => c.homeAway === "away");

  // ESPN status — toutes les valeurs possibles
  const espnStatus = comp?.status?.type?.name
    || comp?.status?.type?.state
    || "STATUS_SCHEDULED";
  const stateType = comp?.status?.type?.state || ""; // "pre" | "in" | "post"

  const homeScore = parseInt(home?.score) ?? 0;
  const awayScore = parseInt(away?.score) ?? 0;

  // Mapping exhaustif ESPN → statut interne
  let status = "TIMED";
  if (
    espnStatus === "STATUS_FINAL" ||
    espnStatus === "STATUS_FULL_TIME" ||
    espnStatus === "STATUS_ABANDONED" ||
    espnStatus === "STATUS_POSTPONED" ||
    stateType === "post"
  ) {
    status = "FINISHED";
  } else if (
    espnStatus === "STATUS_IN_PROGRESS" ||
    espnStatus === "STATUS_HALFTIME" ||
    espnStatus === "STATUS_EXTRA_TIME" ||
    espnStatus === "STATUS_PENALTY" ||
    espnStatus === "STATUS_SHOOTOUT" ||
    espnStatus === "STATUS_SUSPENDED" ||
    espnStatus === "STATUS_DELAYED" ||
    stateType === "in"
  ) {
    status = "IN_PLAY";
  }

  // Group depuis notes ou nom de l'événement
  const note = comp?.notes?.[0]?.headline || ev.name || ev.shortName || "";
  const grpMatch = note.match(/Group\s+([A-Z])/i);
  const roundMatch = note.match(/(Round of|Quarter|Semi|Final)/i);
  const group = grpMatch
    ? `Groupe ${grpMatch[1]}`
    : roundMatch ? note : "";

  // Ville : ESPN met parfois la ville dans venue.address.city ou venue.fullName
  const venue = comp?.venue?.address?.city
    || comp?.venue?.fullName
    || comp?.venue?.address?.state
    || "";

  return {
    id: String(ev.id), // toujours string pour matcher Firestore
    group,
    utcDate: ev.date,
    status,
    espnRaw: espnStatus,
    homeTeam: {
      name: home?.team?.displayName || home?.team?.name || "?",
      shortName: home?.team?.abbreviation || home?.team?.shortDisplayName || home?.team?.displayName || "?"
    },
    awayTeam: {
      name: away?.team?.displayName || away?.team?.name || "?",
      shortName: away?.team?.abbreviation || away?.team?.shortDisplayName || away?.team?.displayName || "?"
    },
    score: { fullTime: { home: homeScore, away: awayScore } },
    venue,
    clock: comp?.status?.displayClock || comp?.status?.detail || "",
    period: comp?.status?.period || 0
  };
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) + " · " +
         d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

    <div class="hero-sub">Coupe du Monde<br>USA · CAN · MEX</div>
  </div>

    ${PROFILES.map(p => {
      const isMe = p.id === currentUser;
      return `
      <div class="score-bar-item ${isMe ? "me" : ""}">

      </div>`;
    }).join("")}
  </div>

  <!-- NAV TABS -->
  <div class="nav-tabs">
    <div class="tab ${currentTab === "matches" ? "active" : ""}" data-tab="matches">Matchs</div>
    <div class="tab ${currentTab === "leaderboard" ? "active" : ""}" data-tab="leaderboard">Classement</div>
    <div class="tab ${currentTab === "mypronos" ? "active" : ""}" data-tab="mypronos">Mes pronos</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    ${currentTab === "matches" ? renderMatchesTab(liveMatches, upcomingMatches, finishedMatches, allPreds, allResults) : ""}
    ${currentTab === "leaderboard" ? renderLeaderboard(totals, details, allPreds, allResults) : ""}
    ${currentTab === "mypronos" ? renderMyPronos(allPreds, allResults) : ""}

}

function renderMatchesTab(live, upcoming, finished, allPreds, allResults) {
  return `
  <div class="match-subtabs">
    <div class="subtab ${matchSubTab === "live" ? "active" : ""}" data-subtab="live">
      ${live.length > 0 ? `<span class="live-dot"></span>` : ""} Live ${live.length > 0 ? `<span class="badge">${live.length}</span>` : ""}
    </div>
    <div class="subtab ${matchSubTab === "upcoming" ? "active" : ""}" data-subtab="upcoming">À venir</div>
    <div class="subtab ${matchSubTab === "finished" ? "active" : ""}" data-subtab="finished">Terminés</div>
  </div>

  ${matchSubTab === "live" ? (live.length ? live.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match en cours</div>`) : ""}
  ${matchSubTab === "upcoming" ? (upcoming.length ? upcoming.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match à venir</div>`) : ""}
  ${matchSubTab === "finished" ? (finished.length ? finished.map(m => renderMatchCard(m, allPreds, allResults)).join("") : `<div class="empty-state">Aucun match terminé</div>`) : ""}
  `;
}

function teamFr(t) {
  const key = t.shortName || t.name || "";
  const full = t.name || "";
  return TEAMS[key]?.fr || TEAMS[full]?.fr || full || key;
}
function teamFlag(t) {
  const key = t.shortName || t.name || "";
  const full = t.name || "";
  return TEAMS[key]?.flag || TEAMS[full]?.flag || "🏳️";
}

function renderMatchCard(m, allPreds, allResults) {
  const mid      = String(m.id);
  const isLive   = m.status === "IN_PLAY" || m.status === "PAUSED";
  const isDone   = m.status === "FINISHED";
  const isTimed  = !isLive && !isDone;
  const preds    = allPreds[mid] || {};
  // Score de référence : Firestore en priorité, sinon score ESPN direct
  const result   = allResults[mid] || (isDone ? {
    home: m.score?.fullTime?.home ?? 0,
    away: m.score?.fullTime?.away ?? 0
  } : null);
  const myP      = preds[currentUser];
  const kickoff  = new Date(m.utcDate).getTime();
  const locked   = isLive || isDone || Date.now() >= kickoff;
  const everyone = PROFILES.every(p => preds[p.id] !== undefined);
  const reveal   = everyone || locked;
  const myPts    = isDone && result && myP ? calcPoints(myP, result) : null;

  const homeFr   = teamFr(m.homeTeam);
  const awayFr   = teamFr(m.awayTeam);
  const homeFlag = teamFlag(m.homeTeam);
  const awayFlag = teamFlag(m.awayTeam);
  const scoreH   = (isLive || isDone) ? (m.score?.fullTime?.home ?? "?") : null;
  const scoreA   = (isLive || isDone) ? (m.score?.fullTime?.away ?? "?") : null;

  // ── Rangée du bas ──────────────────────────────────────────
  let bottomRow = "";
  if (reveal) {
    // Affiche tous les pronos
    const ptsLabel = pts => {
      if (pts === PTS_EXACT)  return ` <em>+3 🎯</em>`;
      if (pts === PTS_DRAW)   return ` <em>+2 ⚖️</em>`;
      if (pts === PTS_WINNER) return ` <em>+1 ✅</em>`;
      if (pts === 0)          return ` <em class="zero">0</em>`;
      return "";
    };
    const chips = PROFILES.map(p => {
      const pred = preds[p.id];
      if (!pred) return `<div class="prono-chip no-pred"><strong>${p.name}</strong> —</div>`;
      const pts = (isDone && result) ? calcPoints(pred, result) : null;
      const cls = pts === PTS_EXACT ? "exact" : pts === PTS_DRAW ? "draw" : pts === PTS_WINNER ? "winner" : pts === 0 && isDone ? "wrong" : "";
      return `<div class="prono-chip ${cls}"><strong>${p.name}</strong> ${pred.home}–${pred.away}${pts !== null ? ptsLabel(pts) : ""}</div>`;
    }).join("");
    const ptsBadge = myPts !== null ? `<div class="pts-chip">+${myPts}pt</div>` : "";
    bottomRow = `<div class="pronos-row">${chips}${ptsBadge}</div>`;
  } else if (isTimed && myP !== undefined) {
    // Mon prono + bouton modifier (pas encore tout le monde)
    const waiting = PROFILES.filter(p => preds[p.id] === undefined).map(p => p.name);
    bottomRow = `
      <div class="pronos-row">
        <div class="prono-chip me-chip">Mon prono : <strong>${myP.home}–${myP.away}</strong></div>
        <div class="prono-chip edit-chip" data-matchid="${mid}">Modifier</div>
      </div>
      <div class="awaiting-row"><span class="waiting-names">En attente : ${waiting.join(", ")}</span></div>`;
  } else if (isTimed) {
    // Pas encore pronostiqué
    const done = PROFILES.filter(p => preds[p.id] !== undefined).map(p => p.name);
    bottomRow = `
      <div class="predict-row">
        <div class="prono-inputs">
          <input class="score-input" type="number" min="0" max="20" placeholder="0" id="h_${mid}">
          <span class="input-sep">–</span>
          <input class="score-input" type="number" min="0" max="20" placeholder="0" id="a_${mid}">
        </div>
        <button class="prono-submit" data-matchid="${mid}">Valider ✓</button>
      </div>
      ${done.length ? `<div class="awaiting-row"><span class="done-names">${done.join(", ")} ✓</span><span class="waiting-names">En attente : ${PROFILES.filter(p => preds[p.id] === undefined).map(p => p.name).join(", ")}</span></div>` : ""}`;
  }

  return `
  <div class="match-card ${isLive ? "live" : ""} ${isDone ? "finished" : ""} ${isTimed ? "upcoming" : ""}">
    <div class="match-top">
      <div class="team-col home">
        <span class="team-flag">${homeFlag}</span>
        <span class="team-name">${homeFr}</span>
      </div>
      <div class="score-box ${isTimed ? "timed" : ""}">
        ${isTimed
          ? `<span class="score-time">${fmtDate(m.utcDate)}</span>`
          : `<span class="score-num">${scoreH}</span><span class="score-dash">–</span><span class="score-num">${scoreA}</span>`
        }
      </div>
      <div class="team-col away">
        <span class="team-name">${awayFr}</span>
        <span class="team-flag">${awayFlag}</span>
      </div>
    </div>
    <div class="match-meta">
      <div class="match-meta-info">${m.group || ""} · ${m.venue || ""}</div>
      ${isLive ? `<div class="live-badge"><span class="live-dot"></span> ${m.clock || "LIVE"}</div>` : ""}
      ${isDone  ? `<div class="finished-badge">Terminé</div>` : ""}
    </div>
    ${bottomRow}
  </div>`;
}

function renderLeaderboard(totals, details, allPreds, allResults) {
  const sorted = [...PROFILES].sort((a,b) => totals[b.id] - totals[a.id]);
  const finishedCount = Object.keys(allResults).length;
  const totalMatches = matches.length;

  return `
  <div class="lb-card">
    <div class="lb-header">Classement général · ${finishedCount} match${finishedCount > 1 ? "s" : ""} joué${finishedCount > 1 ? "s" : ""} / ${totalMatches}</div>
    ${sorted.map((p, i) => {
      const rank = i + 1;
      const isMe = p.id === currentUser;
      return `
      <div class="lb-row ${rank === 1 ? "first-place" : ""} ${isMe ? "is-me" : ""}">
        <div class="lb-rank ${rank === 1 ? "top" : ""}">${rank}</div>
        <div class="lb-avatar ${rank === 1 ? "gold" : ""}">${p.initial}</div>
        <div class="lb-info">
          <div class="lb-name">${p.name} ${isMe ? "<span class='me-tag'>moi</span>" : ""}</div>
          <div class="lb-breakdown">
            <span>${details[p.id].exact}</span> exact${details[p.id].exact > 1 ? "s" : ""} ·
            <span>${details[p.id].draw}</span> nul${details[p.id].draw > 1 ? "s" : ""} ·
            <span>${details[p.id].winner}</span> victoire${details[p.id].winner > 1 ? "s" : ""}
          </div>
        </div>
        <div class="lb-pts-block">
          <span class="lb-pts">${totals[p.id]}</span>
          <span class="lb-pts-label">PTS</span>
        </div>
      </div>`;
    }).join("")}
  </div>

  <div class="rules-card">
    <div class="rules-title">Système de points</div>
    <div class="rules-row"><div class="rules-pts exact-pts">+3</div><div>Score exact 🎯</div></div>
    <div class="rules-row"><div class="rules-pts draw-pts">+2</div><div>Nul correct ⚖️</div></div>
    <div class="rules-row"><div class="rules-pts winner-pts">+1</div><div>Vainqueur correct ✅</div></div>
    <div class="rules-row"><div class="rules-pts wrong-pts">0</div><div>Mauvais résultat</div></div>
  </div>`;
}

function renderMyPronos(allPreds, allResults) {
  const myMatches = matches.filter(m => allPreds[m.id]?.[currentUser] !== undefined);
  if (!myMatches.length) return `<div class="empty-state">Tu n'as pas encore pronostiqué</div>`;

  return myMatches.map(m => {
    const pred = allPreds[m.id][currentUser];
    const result = allResults[m.id];
    const pts = result ? calcPoints(pred, result) : null;
    const isFinished = m.status === "FINISHED";
    const cls = pts === PTS_EXACT ? "exact" : pts === PTS_WINNER ? "winner" : pts === 0 && isFinished ? "wrong" : "";

    return `
    <div class="my-prono-row ${cls}">
      <div class="mpr-teams">${teamFlag(m.homeTeam)} ${teamFr(m.homeTeam)} – ${teamFr(m.awayTeam)} ${teamFlag(m.awayTeam)}</div>
      <div class="mpr-pred">${pred.home}–${pred.away}</div>
      ${isFinished && result ? `<div class="mpr-result">${result.home}–${result.away}</div>` : `<div class="mpr-pending">${fmtDate(m.utcDate)}</div>`}
      ${pts !== null ? `<div class="mpr-pts ${cls}">+${pts}pt</div>` : ""}
    </div>`;
  }).join("");
}

// ─── MAIN ─────────────────────────────────────────────────────────
let allPreds = {};
let allResults = {};

async function init() {
  // Load matches from API
  const root = document.getElementById("root");
  root.innerHTML = `<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Chargement…</div></div>`;

  matches = await fetchMatches();

  // Listen Firestore in real-time
  listenPredictions(data => {
    allPreds = data;
    if (currentUser) renderPage();
  });
  listenResults(data => {
    allResults = data;
    if (currentUser) renderPage();
  });

  // Auto-refresh ESPN : 30s si match en cours, 60s sinon
  setInterval(async () => {
    const fresh = await fetchMatches();
    if (fresh.length > 0) {
      matches = fresh;
      if (currentUser) renderPage();
    }
  }, 30000);

  renderPage();
}

function renderPage() {
  const root = document.getElementById("root");
  if (!currentUser) {
    root.innerHTML = renderProfilePicker();
    attachProfilePickerEvents();
  } else {
    root.innerHTML = renderApp(allPreds, allResults);
    attachAppEvents();
  }
}

function attachProfilePickerEvents() {
  document.querySelectorAll(".profile-pick-card").forEach(el => {
    el.addEventListener("click", () => {
      currentUser = el.dataset.id;
      localStorage.setItem("mondial26_user", currentUser);
      renderPage();
    });
  });
}

function attachAppEvents() {
  // Tab switching
  document.querySelectorAll(".tab[data-tab]").forEach(el => {
    el.addEventListener("click", () => {
      currentTab = el.dataset.tab;
      renderPage();
    });
  });

  // Subtab switching
  document.querySelectorAll(".subtab[data-subtab]").forEach(el => {
    el.addEventListener("click", () => {
      matchSubTab = el.dataset.subtab;
      renderPage();
    });
  });

  // Submit prediction
  document.querySelectorAll(".prono-submit[data-matchid]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const mid = btn.dataset.matchid;
      const h = document.getElementById(`h_${mid}`)?.value;
      const a = document.getElementById(`a_${mid}`)?.value;
      if (h === "" || a === "" || h === undefined || a === undefined) {
        showToast("Entre les deux scores !");
        return;
      }
      btn.disabled = true;
      btn.textContent = "…";
      try {
        await savePrediction(mid, h, a);
        showToast("Prono enregistré ✓");
      } catch(e) {
        showToast("Erreur — réessaie");
        btn.disabled = false;
        btn.textContent = "Valider ✓";
      }
    });
  });

  // Edit prediction
  document.querySelectorAll(".edit-chip[data-matchid]").forEach(el => {
    el.addEventListener("click", () => {
      const mid = el.dataset.matchid;
      delete allPreds[mid]?.[currentUser];
      renderPage();
    });
  });

  // Switch user
  document.getElementById("btn-switch-user")?.addEventListener("click", () => {
    currentUser = null;
    localStorage.removeItem("mondial26_user");
    renderPage();
  });
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── GRID OVERLAY TOGGLE (press G, or click button) ────────────────
(function () {
  const btn = document.getElementById("gridToggle");
  const cols = document.querySelector(".guides .cols");
  const n = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--cols"), 10) || 4;
  for (let i = 0; i < n; i++) {
    const c = document.createElement("div");
    c.className = "col";
    cols.appendChild(c);
  }
  function setGrid(on) {
    document.body.classList.toggle("grid-on", on);
    if (btn) btn.querySelector(".gt-lbl").textContent = on ? "Hide grid" : "Grid (G)";
  }
  if (btn) btn.addEventListener("click", () => setGrid(!document.body.classList.contains("grid-on")));
  document.addEventListener("keydown", e => {
    if ((e.key === "g" || e.key === "G") && !e.metaKey && !e.ctrlKey && !e.altKey) {
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      setGrid(!document.body.classList.contains("grid-on"));
    }
  });
})();

// ─── OPTICAL ALIGNMENT — nudge display type so its INK (not its box)
// lands on the grid line. Large grotesque glyphs carry a left side-bearing.
(function () {
  const cvs = document.createElement("canvas"), ctx = cvs.getContext("2d");
  const sel = ".masthead, .numeral";
  function align() {
    document.querySelectorAll(sel).forEach(el => {
      el.style.marginLeft = "0px";
      const cs = getComputedStyle(el);
      let ch = (el.textContent || "").trim().charAt(0);
      if (!ch) return;
      if (cs.textTransform === "uppercase") ch = ch.toUpperCase();
      ctx.font = cs.fontStyle + " " + cs.fontWeight + " " + cs.fontSize + " " + cs.fontFamily;
      ctx.textAlign = "left";
      const abl = ctx.measureText(ch).actualBoundingBoxLeft;
      if (isFinite(abl)) el.style.marginLeft = abl.toFixed(2) + "px";
    });
  }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(align);
  align();
  let t;
  window.addEventListener("resize", () => { clearTimeout(t); t = setTimeout(align, 120); });
  const mo = new MutationObserver(() => { clearTimeout(t); t = setTimeout(align, 30); });
  mo.observe(document.getElementById("root"), { childList: true, subtree: true });
})();

init();
</script>

<style>
/* ═══════════════════════════════════════════════════════════
   STADIUM NIGHT — Müller-Brockmann grid + 3-layer token system
   One source of truth. All spacing = multiples of --bl (8px).
   Mobile: 4 cols → desktop 12 cols / 16px gutter / 16px margin
   ═══════════════════════════════════════════════════════════ */
:root {
  /* ── Layer 1 · Primitives ─────────────────────────────── */
  --p-black:   #0A0A0F;
  --p-surface: #12121A;
  --p-border:  #1E1E2E;
  --p-red:     #E3001B;

  /* ── Layer 2 · Semantic ───────────────────────────────── */
  --color-bg: var(--p-black);
  --color-surface: var(--p-surface);

  --text-base: 13px;
  --text-lg: 16px;
  --text-xl: 24px;
  --text-2xl: 32px;
  --text-display: 56px;

  /* ── Layer 3 · Component ──────────────────────────────── */
  --card-bg: var(--color-surface);
  --card-border: var(--color-border);
  --score-bg: var(--color-accent);
  --score-bg-idle: var(--color-border);
  --chip-bg: rgba(255,255,255,.02);
  --chip-exact-bg: rgba(34,197,94,.1);
  --chip-exact-border: var(--color-exact);

  --g-col: rgba(227,0,27,.07);

  --g-base: rgba(0,102,255,.30);
  --g-base-min: rgba(0,102,255,.10);
}

/* ─── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: var(--font-sans);
  background: var(--color-bg);
  color: var(--color-text);
  min-height: 100vh;
  line-height: var(--lh);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

/* ─── GRID OVERLAY (toggle with G) — same box as content ──── */
.guides {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  opacity: 0; transition: opacity .12s ease;
}
body.grid-on .guides { opacity: 1; }
.guides .cols {
  position: absolute; top: 0; bottom: 0;
  left: var(--margin); right: var(--margin);
  display: grid; grid-template-columns: repeat(var(--cols), 1fr);
  column-gap: var(--gutter);
}
.guides .col { background: var(--g-col); box-shadow: inset 1px 0 0 var(--g-edge), inset -1px 0 0 var(--g-edge); }
.guides .rows {
  position: absolute; left: var(--margin); right: var(--margin); top: 0; bottom: 0;
  background-image:
    repeating-linear-gradient(to bottom, var(--g-base) 0 1px, transparent 1px var(--lh)),
    repeating-linear-gradient(to bottom, var(--g-base-min) 0 1px, transparent 1px var(--bl));
}
.guides .mline { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--g-edge); }
.guides .mline.l { left: var(--margin); } .guides .mline.r { right: var(--margin); }
.grid-toggle {
  position: fixed; bottom: var(--lh); right: var(--lh); z-index: 10000;
  background: var(--color-surface); color: var(--color-text-soft);

body.grid-on .grid-toggle { color: var(--color-text); border-color: var(--color-accent); }
.grid-toggle .gt-dot { width: 6px; height: 6px; background: var(--color-border); }
body.grid-on .grid-toggle .gt-dot { background: var(--color-accent); }

  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.3em;
  color: var(--color-text-soft); text-transform: uppercase;
  margin-bottom: calc(var(--lh) * 3);
  line-height: var(--lh);
}
.profile-picker-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--gutter);
  width: 100%;
  max-width: 560px;
}
.profile-pick-card {
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  padding: calc(var(--lh) * 1.5) var(--bl);
  text-align: center; cursor: pointer;
  transition: border-color .12s ease, box-shadow .12s ease, transform .12s ease;
  border-radius: 0;
}
.profile-pick-card:hover {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 1px var(--color-accent), 0 0 24px rgba(227,0,27,.35);
}
.profile-pick-card:active,
.profile-pick-card.selecting { transform: scale(0.97); }
.ppc-initial {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-display); color: var(--color-accent);
  line-height: var(--text-display); display: block;
  margin-bottom: var(--bl);
}
.ppc-name {
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.15em; color: var(--color-text-soft);
  text-transform: uppercase; line-height: var(--lh);
}

/* ─── HEADER ──────────────────────────────────────────────── */
.header {
  background: var(--color-bg);
  padding: calc(var(--lh) - 2px) var(--margin);
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--color-border);
  position: sticky; top: 0; z-index: 100;
}
.logo {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-lg); letter-spacing: -0.01em;
  line-height: var(--lh);
}
.logo span { color: var(--color-accent); }
.header-right { display: flex; align-items: center; gap: var(--gutter); }
.header-live {
  display: flex; align-items: center; gap: var(--bl);
  font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: 0.1em; color: var(--color-accent); text-transform: uppercase;
}
.header-user {
  display: flex; align-items: center; gap: var(--bl);
  cursor: pointer; padding: var(--bl) var(--lh);
  border: 1px solid var(--color-border);
  border-radius: 999px;
  font-size: var(--text-sm); color: var(--color-text-soft);
  transition: border-color .12s ease, transform .12s ease;
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
}
.header-user:hover { border-color: var(--color-text); }
.header-user:active { transform: scale(0.97); }
.header-avatar {
  width: var(--lh); height: var(--lh);
  background: var(--color-action); color: var(--color-text);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-sm);
}

/* ─── HERO STRIP ──────────────────────────────────────────── */
.hero-strip {
  background: var(--color-accent);
  padding: calc(var(--lh) * 1.5) var(--margin);
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: end;
  gap: var(--gutter);
  border-bottom: 1px solid var(--color-border);
}
.hero-title {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-display);
  line-height: var(--text-display); color: #fff; text-transform: uppercase;
  letter-spacing: -0.02em;
}
.hero-sub {
  font-family: var(--font-mono);
  font-size: var(--text-xs); color: rgba(255,255,255,0.65);
  letter-spacing: 0.15em; text-transform: uppercase;
  line-height: var(--lh);
  text-align: right;
}

/* ─── SCORE BAR ───────────────────────────────────────────── */
.score-bar {
  background: var(--color-surface);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-bottom: 1px solid var(--color-border);
}
.score-bar-item {
  padding: var(--lh) var(--margin);
  border-right: 1px solid var(--color-border);
  transition: background .12s ease;
}
.score-bar-item:last-child { border-right: none; }
.sbi-initial {
  width: var(--lh); height: var(--lh);
  background: var(--color-border); color: var(--color-text-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-sm);
  margin-bottom: var(--bl);
}
.sbi-initial.active { background: var(--color-action); color: #fff; }
.sbi-name {
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.1em;
  color: var(--color-text-soft); text-transform: uppercase;
  line-height: var(--lh);
}
.score-bar-item.me .sbi-name { color: var(--color-text); }
.sbi-pts {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-2xl);
  color: var(--color-text); line-height: var(--text-2xl);
  margin-top: calc(var(--bl) / 2);
  letter-spacing: -0.02em;
  opacity: 0; transform: translateY(6px);
  animation: score-reveal .24s ease forwards;
}
@keyframes score-reveal { to { opacity: 1; transform: translateY(0); } }
.sbi-pts span {
  font-size: var(--text-sm); color: var(--color-text-soft);
  font-weight: 400; letter-spacing: 0;
  font-family: var(--font-mono);
}

/* ─── NAV TABS ────────────────────────────────────────────── */
.nav-tabs {
  background: var(--color-bg);
  display: flex; border-bottom: 1px solid var(--color-border);
  padding: 0 var(--margin); gap: var(--lh);
  position: sticky; top: 57px; z-index: 90;
}
.tab {
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--color-text-soft); padding: calc(var(--lh) - 1px) 0;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: color .12s ease, border-color .12s ease;
  white-space: nowrap; line-height: var(--lh);
}
.tab.active { color: var(--color-text); border-bottom-color: var(--color-accent); }

/* ─── CONTENT ─────────────────────────────────────────────── */
.content { padding: var(--lh) var(--margin) calc(var(--lh) * 6); }

/* SUBTABS */
.match-subtabs {
  display: flex; gap: var(--bl); margin-bottom: var(--lh);
}
.subtab {
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.1em;
  text-transform: uppercase; padding: var(--bl) var(--lh);
  border: 1px solid var(--color-border);
  color: var(--color-text-soft); cursor: pointer;
  display: flex; align-items: center; gap: var(--bl);
  transition: all .12s ease; line-height: var(--lh);
}
.subtab:active { transform: scale(0.97); }
.subtab.active { background: var(--color-text); color: var(--color-bg); border-color: var(--color-text); }
.badge {
  background: var(--color-accent); color: #fff;
  padding: 0 6px; font-size: 9px;
  font-family: var(--font-mono);
  line-height: 16px;
}

/* ─── MATCH CARD ──────────────────────────────────────────── */
.match-card {
  background: var(--card-bg);
  margin-bottom: var(--lh);
  border: 1px solid var(--card-border);
  transition: border-color .12s ease;
}
.match-card.live {
  border-color: var(--color-accent);
  border-left: 3px solid var(--color-accent);
  box-shadow: 0 0 20px rgba(227,0,27,.12);
}
.match-top {
  padding: var(--lh) var(--margin) var(--bl);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: var(--bl);
}
.team-col {
  display: flex; flex-direction: column; gap: 2px;
}
.team-col.away { align-items: flex-end; text-align: right; }
.team-flag { font-size: 20px; line-height: 24px; }
.team-name {
  font-family: var(--font-sans);
  font-weight: 700; font-size: var(--text-base); color: var(--color-text);
  line-height: var(--lh); letter-spacing: -0.01em;
}
.match-card.upcoming .team-name { color: var(--color-text-soft); }

.score-box {
  background: var(--score-bg);
  padding: var(--bl) var(--lh);
  display: flex; align-items: center;
  gap: var(--bl); min-width: 80px; justify-content: center;
}
.score-box.timed {
  background: var(--score-bg-idle); flex-direction: column; gap: 0;
  min-width: 112px;
}
.score-time {
  font-family: var(--font-mono);
  font-size: var(--text-xs); color: var(--color-text-soft);
  text-align: center; letter-spacing: 0.05em;
  line-height: var(--lh);
}
.score-num {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-2xl); color: #fff;
  line-height: var(--text-2xl); letter-spacing: -0.02em;
}
.score-dash { color: rgba(255,255,255,0.4); font-size: 16px; line-height: 32px; }

.match-meta {
  padding: 0 var(--margin) var(--bl);
  display: flex; justify-content: space-between; align-items: center;
}
.match-meta-info {
  font-family: var(--font-mono);
  font-size: var(--text-xs); color: var(--color-text-soft);
  letter-spacing: 0.05em; line-height: var(--lh);
}
.live-badge {
  font-family: var(--font-mono);
  font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.15em;
  color: var(--color-accent); display: flex; align-items: center; gap: var(--bl);
  text-transform: uppercase;
}
.finished-badge {
  font-family: var(--font-mono);
  font-size: var(--text-xs); color: var(--color-text-soft); letter-spacing: 0.1em;
}
.debug-status {
  font-family: var(--font-mono);
  font-size: 9px; color: var(--color-border);
  letter-spacing: 0.05em;
}
.live-dot {
  width: 6px; height: 6px; background: var(--color-accent);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(227,0,27,.5); }
  50%     { opacity: 0.5; box-shadow: 0 0 0 4px rgba(227,0,27,0); }
}

/* PRONOS ROW */
.pronos-row {
  border-top: 1px solid var(--color-border);
  padding: var(--bl) var(--margin);
  display: flex; gap: var(--bl); align-items: center; flex-wrap: wrap;
}
.prono-chip {
  background: var(--chip-bg); border: 1px solid var(--color-border);
  padding: 4px var(--bl);
  font-family: var(--font-mono);
  font-size: var(--text-xs); color: var(--color-text-soft); letter-spacing: 0.05em;
  line-height: var(--lh);
}
.prono-chip strong { color: var(--color-text); font-weight: 700; }
.prono-chip.draw { border-color: var(--chip-draw-border); background: var(--chip-draw-bg); color: var(--color-draw); }
.prono-chip.draw strong { color: var(--color-draw); }
.prono-chip em { color: var(--color-action); font-style: normal; margin-left: 4px; }
.prono-chip em.zero { color: var(--color-text-soft); }
.prono-chip.exact { border-color: var(--chip-exact-border); background: var(--chip-exact-bg); color: var(--color-exact); }
.prono-chip.exact strong { color: var(--color-exact); }
.prono-chip.winner { border-color: var(--chip-winner-border); background: var(--chip-winner-bg); color: var(--color-action); }
.prono-chip.winner strong { color: var(--color-action); }
.prono-chip.wrong { border-color: var(--chip-wrong-border); background: transparent; color: var(--color-text-soft); }
.prono-chip.wrong strong { color: var(--color-text-soft); }
.prono-chip.me-chip { border-color: var(--chip-winner-border); background: var(--chip-winner-bg); color: var(--color-action); }
.prono-chip.edit-chip { cursor: pointer; border-style: dashed; transition: transform .12s ease; }
.prono-chip.edit-chip:active { transform: scale(0.97); }
.prono-chip.no-pred { opacity: 0.35; }
.pts-chip {
  margin-left: auto; background: var(--color-action);
  padding: 4px var(--bl);
  font-family: var(--font-mono);
  font-size: var(--text-xs); font-weight: 700; color: #fff; letter-spacing: 0.05em;
  line-height: var(--lh);
}

/* PREDICT ROW */
.predict-row {
  border-top: 1px solid var(--color-border);
  padding: var(--bl) var(--margin);
  display: flex; align-items: center; gap: var(--lh);
}
.prono-inputs { display: flex; align-items: center; gap: var(--bl); }
.score-input {
  width: 48px; height: 48px;
  border: 1px solid var(--color-border);
  text-align: center;
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-xl); color: var(--color-text);
  outline: none; background: var(--color-bg);
  transition: border-color .12s ease, box-shadow .12s ease; line-height: 48px;
}
.score-input:focus { border-color: var(--color-action); box-shadow: 0 0 0 3px rgba(0,102,255,.2); }
.input-sep {
  font-size: 16px; color: var(--color-text-soft);
  font-family: var(--font-sans);
}
.prono-submit {
  margin-left: auto; background: var(--color-action); color: #fff;
  border: none; padding: 12px var(--lh);
  font-family: var(--font-mono);
  font-weight: 700; font-size: var(--text-xs); letter-spacing: 0.15em;
  cursor: pointer; text-transform: uppercase; line-height: var(--lh);
  transition: background .12s ease, transform .12s ease;
}
.prono-submit:hover { background: #0052CC; }
.prono-submit:active { transform: scale(0.97); }
.prono-submit:disabled { background: var(--color-border); cursor: default; }

/* AWAITING ROW */
.awaiting-row {
  border-top: 1px solid var(--color-border);
  padding: var(--bl) var(--margin);
  display: flex; gap: var(--lh); align-items: center; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: 0.05em; line-height: var(--lh);
}
.done-names { color: var(--color-exact); }
.waiting-names { color: var(--color-text-soft); }

/* EMPTY STATE */
.empty-state {
  text-align: left; padding: calc(var(--lh) * 3) 0;
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.15em;
  color: var(--color-text-soft); text-transform: uppercase;
  line-height: var(--lh);
}

/* ─── LEADERBOARD ─────────────────────────────────────────── */
.lb-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  margin-bottom: var(--lh);
}
.lb-header {
  background: var(--color-accent); padding: var(--bl) var(--margin);
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.2em; color: #fff;
  text-transform: uppercase; line-height: var(--lh);
}
.lb-row {
  display: grid;
  grid-template-columns: 24px var(--lh) 1fr auto;
  align-items: center; padding: var(--lh) var(--margin);
  gap: var(--lh); border-bottom: 1px solid var(--color-border);
}
.lb-row:last-child { border: none; }
.lb-row.is-me { background: rgba(0,102,255,.06); }
.lb-rank {
  font-family: var(--font-mono);
  font-size: var(--text-sm); color: var(--color-text-soft); font-weight: 700;
  line-height: var(--lh);
}
.lb-rank.top { color: var(--color-gold); }
.lb-avatar {
  width: var(--lh); height: var(--lh);
  background: var(--color-border); color: var(--color-text-soft);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-sm);
}
.lb-avatar.gold { background: var(--color-action); color: #fff; box-shadow: 0 0 0 2px var(--color-gold); }
.lb-info {}
.lb-name {
  font-family: var(--font-sans);
  font-weight: 700; font-size: var(--text-lg); letter-spacing: -0.01em;
  line-height: var(--lh); color: var(--color-text);
}
.lb-row.first-place .lb-name { color: var(--color-gold); }
.me-tag {
  background: var(--color-action); color: #fff;
  font-size: 9px; padding: 1px 5px;
  font-family: var(--font-mono); letter-spacing: 0.1em;
  vertical-align: middle; margin-left: var(--bl);
}
.lb-breakdown {
  font-family: var(--font-mono);
  font-size: 9px; color: var(--color-text-soft);
  letter-spacing: 0.05em; line-height: var(--lh);
  margin-top: 2px;
}
.lb-breakdown span { color: var(--color-accent); font-weight: 700; }
.lb-pts-block { text-align: right; }
.lb-pts {
  font-family: var(--font-sans);
  font-weight: 900; font-size: 40px; color: var(--color-text);
  line-height: 40px; letter-spacing: -0.03em; display: block;
}
.lb-row.first-place .lb-pts { color: var(--color-gold); }
.lb-pts-label {
  font-family: var(--font-mono);
  font-size: 9px; color: var(--color-text-soft); letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* RULES CARD */
.rules-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: var(--lh) var(--margin);
}
.rules-title {
  font-family: var(--font-mono);
  font-size: var(--text-xs); letter-spacing: 0.2em; color: var(--color-text-soft);
  text-transform: uppercase; margin-bottom: var(--lh);
  line-height: var(--lh);
}
.rules-row {
  display: flex; align-items: center; gap: var(--lh);
  padding: var(--bl) 0; border-bottom: 1px solid var(--color-border);
  font-family: var(--font-mono); font-size: var(--text-sm);
  color: var(--color-text-soft); line-height: var(--lh);
}
.rules-row:last-child { border: none; }
.rules-pts {
  font-family: var(--font-sans);
  font-weight: 900; font-size: var(--text-xl); width: 40px;
  line-height: var(--text-xl); letter-spacing: -0.02em;
}
.exact-pts { color: var(--color-exact); }
.draw-pts { color: var(--color-draw); }
.winner-pts { color: var(--color-action); }
.wrong-pts { color: var(--color-text-soft); }

/* ─── MY PRONOS ───────────────────────────────────────────── */
.my-prono-row {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  margin-bottom: var(--bl);
  padding: var(--bl) var(--margin);
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center; gap: var(--bl);
  line-height: var(--lh);
}
.my-prono-row.exact { border-left: 3px solid var(--color-exact); }
.my-prono-row.winner { border-left: 3px solid var(--color-action); }
.my-prono-row.wrong { border-left: 3px solid var(--p-gray-700); }
.mpr-teams {
  font-family: var(--font-sans);
  font-weight: 600; font-size: var(--text-base); color: var(--color-text);
  letter-spacing: -0.01em;
}
.mpr-pred {
  font-family: var(--font-sans);
  font-weight: 900; font-size: 18px; color: var(--color-text);
  line-height: var(--lh); letter-spacing: -0.02em;
}
.mpr-result {
  font-family: var(--font-mono);
  font-size: 12px; color: var(--color-text-soft); line-height: var(--lh);
}
.mpr-pending {
  font-family: var(--font-mono);
  font-size: 9px; color: var(--color-text-soft); letter-spacing: 0.05em;
}
.mpr-pts {
  font-family: var(--font-sans);
  font-weight: 900; font-size: 18px;
  line-height: var(--lh); letter-spacing: -0.02em;
  min-width: 24px; text-align: right;
}
.mpr-pts.exact { color: var(--color-exact); }
.mpr-pts.winner { color: var(--color-action); }
.mpr-pts.wrong { color: var(--color-text-soft); }

/* ─── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: var(--lh);
  left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--color-text); color: var(--color-bg);
  font-family: var(--font-mono);
  font-size: var(--text-sm); letter-spacing: 0.1em;
  padding: var(--bl) var(--lh);
  opacity: 0; transition: all .2s ease;
  z-index: 1000; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
<div class="guides" aria-hidden="true">
  <div class="cols"></div>
  <div class="rows"></div>
  <div class="mline l"></div><div class="mline r"></div>
</div>
<button class="grid-toggle" id="gridToggle" type="button"><span class="gt-dot"></span><span class="gt-lbl">Grid (G)</span></button>
</body>
</html>
